<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ display_name }} — Региональный правовой портал ЧР</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f8;
            color: #1a1a2e;
            min-height: 100vh;
        }

        /* Декоративный фон для эффекта стекла */
        body::before {
            content: '';
            position: fixed;
            top: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -100px;
            left: -100px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 149, 59, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .header-main {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            background: rgba(26, 26, 46, 0.55);
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            padding: 20px 0;
            transition: background 0.3s ease;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .header-main .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-area a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .logo-area a:hover { color: #fff; }

        .logo-area h1 {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        .page-header {
            padding: 28px 0 20px;
        }

        .page-header .back-link {
            color: #e94560;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .page-header .back-link:hover { text-decoration: underline; }

        .page-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-top: 8px;
            color: #1a1a2e;
        }

        .page-header .desc {
            color: #5f6368;
            font-size: 0.9rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 10px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02);
        }

        .card:hover {
            border-color: #e94560;
            box-shadow: 0 8px 32px rgba(233, 69, 96, 0.08);
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.95);
        }

        .card .icon {
            font-size: 1.6rem;
            margin-bottom: 12px;
            color: #1a1a2e;
        }

        .card .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .card .card-desc {
            font-size: 0.8rem;
            color: #5f6368;
            line-height: 1.4;
        }

        .card .card-count {
            display: inline-block;
            margin-top: 12px;
            background: rgba(241, 243, 244, 0.7);
            padding: 3px 12px;
            border-radius: 4px;
            font-size: 0.7rem;
            color: #5f6368;
        }

        .card .arrow {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #dadce0;
            transition: color 0.3s ease;
        }

        .card:hover .arrow {
            color: #e94560;
        }

        .footer {
            margin-top: 40px;
            padding: 20px 0;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .footer .copyright {
            color: #9aa0a6;
            font-size: 0.7rem;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .header-main .container { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <header class="header-main">
        <div class="container">
            <div class="logo-area">
                <a href="/"><i class="fas fa-arrow-left"></i> На главную</a>
                <h1>{{ display_name }}</h1>
            </div>
            <span style="color: rgba(255, 255, 255, 0.4); font-size: 0.75rem;">Выберите раздел</span>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <h2>{{ display_name }}</h2>
            <p class="desc">Доступные разделы документов</p>
        </div>

        <div class="grid">
            {% for sub in sub_dbs %}
            <a href="/db/{{ db_name }}?sub_db={{ sub.name }}" class="card">
                <div class="icon">{{ sub.icon }}</div>
                <div class="card-title">{{ sub.display_name }}</div>
                <div class="card-desc">Официальные документы</div>
                <span class="card-count">{{ sub.count }} документов</span>
                <span class="arrow">→</span>
            </a>
            {% endfor %}
        </div>

        <footer class="footer">
            <div class="copyright">© 2026 Региональный правовой портал Чеченской Республики</div>
        </footer>
    </div>
</body>
</html>
